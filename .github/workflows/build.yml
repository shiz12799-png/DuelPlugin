name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found zip: $ZIP"
          unzip "$ZIP"
          DIR=$(find . -name "pom.xml" | head -1 | xargs dirname)
          echo "Found pom in: $DIR"
          cd "$DIR"
          mvn package -q
      - uses: actions/upload-artifact@v4
        with:
          name: DuelPlugin
          path: "**/target/DuelPlugin-*-shaded.jar"
